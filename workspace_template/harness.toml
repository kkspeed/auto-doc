# Harness orchestrator config. Edit and commit changes you make to the defaults.

[models]
# Per-role: which CLI tool to spawn AND which model ID.
# Supported tools: "claude", "codex", "gemini".
# Verifier C should differ from designer/reviewer — same-model self-verification
# is degenerate. If you don't have codex, change verifier_c to a different
# Claude model (e.g., sonnet) via the "claude" tool for a weaker but still
# useful cross-check.

[models.planner]
tool  = "claude"
model = "claude-haiku-4-5-20251001"

[models.designer]
tool  = "claude"
model = "claude-opus-4-7-20260315"
# The designer authors doc sections by editing files directly (the harness
# derives the patch from git — the LLM never writes diff text). Write/Edit are
# required; Read/Grep/Glob let it inspect the current doc + evidence. The harness
# scopes edits to the variant's doc dir and rejects anything outside it.
allowed_tools = ["Read", "Grep", "Glob", "Write", "Edit"]
permission_mode = "acceptEdits"

[models.reviewer]
tool  = "claude"
model = "claude-opus-4-7-20260315"

[models.verifier_c]
tool  = "codex"
model = "gpt-5-20260301"

[models.seed_judge]
# One-time round-0 quality eval of the seed doc — establishes the baseline
# scorecard that every later round must improve on. A strong judgment model is
# worth it since this baseline gates the whole run. Omit this section and the
# harness falls back to the reviewer model.
tool  = "claude"
model = "claude-opus-4-7-20260315"

[models.repo_adapter]
# Resolves the designer's repo queries by reading the read-only repo/ and
# returning cited evidence. Omit this section and the harness falls back to the
# designer model.
tool  = "claude"
model = "claude-opus-4-7-20260315"
# Tool access (claude). Without an allowed_tools list the spawn cannot read
# files — these enable grounding in repo/. Add "Bash(gh:*)" to let it shell out
# to gh, and mcp__<server> entries to expose MCP tools (see mcp_config below).
allowed_tools = ["Read", "Grep", "Glob", "Bash(gh:*)"]
# Claude reads MCP servers from .mcp.json (its native convention). A missing
# file is ignored. To reach gdrive / glean / other workspace endpoints, add the
# server to .mcp.json and its tool to allowed_tools (e.g. "mcp__gdrive").
mcp_config = [".mcp.json"]
# strict_mcp_config = true    # ignore globally-configured MCP, use only the
#                             # files above (reproducible across machines)
# permission_mode = "acceptEdits"   # if tools are silently denied in headless

# MCP is configured PER CLI TOOL — .mcp.json is Claude-only:
#   codex:  servers live in ~/.codex/config.toml [mcp_servers]; pass overrides
#           via extra_args = ["-c", "mcp_servers..."] and sandbox = "read-only".
#   gemini: servers live in .gemini/settings.json (manage with `gemini mcp`);
#           restrict via mcp_server_names = ["gdrive"] and approval_mode.


[run]
# Loop bounds: whichever hits first ends the run.
max_rounds = 200                  # absolute round cap; overnight targets 100-120
max_wall_clock_hours = 12         # second cap

# Cadence + scope.
verifier_c_every = 1              # 1 = every round; raise to reduce Codex spend
patch_max_sections = 3            # hook rejects round-commits touching >N section files
spawn_timeout_seconds = 300       # absolute cap per CLI spawn
silence_timeout_seconds = 300     # cap for no stdout/stderr activity; set <= spawn timeout


[claim_graph]
# Claim graph thresholds (see harness/claim_graph.py).
stale_proposals_threshold_rounds = 5    # proposed decisions older than N rounds surface as stale
bootstrap_registry_size_threshold = 5   # reviewer permissive on new-decision proposals when registry has fewer entries


[scorecard]
# Merge gate: a round must improve >=1 dimension and may not drop any dimension
# by more than this tolerance below its prior value. See harness/scorecard.py.
regression_tolerance = 0.05


[verifiers]
# Verifier B (excerpt match): the fraction of a cited evidence excerpt that must
# appear in the doc paragraph around the cite (asymmetric coverage, 0..1). The
# doc's surrounding prose does not count against it. Adapter-sourced evidence
# (source = "repo") is exempt — its verbatim source/code excerpt is judged by
# Verifier C, not by text matching. Lower this if faithful quotes still trip it.
excerpt_match_threshold = 0.6
